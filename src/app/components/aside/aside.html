<aside class="flex flex-col bg-[#CC2A2A] h-screen w-64 fixed top-0 left-0 shadow-lg">
    <div class="px-7 py-8">
        <h1 class="text-white font-bold text-xl tracking-wide">Menu</h1>
    </div>

    <nav class="flex flex-col gap-1">
        <button (click)="irParaDashboard()"
            class="flex items-center gap-4 px-7 py-3 text-white/90 hover:bg-[#a62323] hover:text-white transition-all border-l-4 border-transparent hover:border-white cursor-pointer">
            <img src="/home.svg" class="w-5 h-5">
            <span class="text-sm font-medium">Dashboard</span>
        </button>

        <button (click)="irAoLiberarEntrada()"
            class="flex items-center gap-4 px-7 py-3 text-white/90 hover:bg-[#a62323] hover:text-white transition-all border-l-4 border-transparent hover:border-white cursor-pointer">
            <img src="/seta-direita.svg" class="w-5 h-5">
            <span class="text-sm font-medium">Liberar entrada</span>
        </button>

        <button (click)="irAoLiberarSaida()"
            class="flex items-center gap-4 px-7 py-3 text-white/90 hover:bg-[#a62323] hover:text-white transition-all border-l-4 border-transparent hover:border-white cursor-pointer">
            <img src="/seta-esquerda.svg" class="w-5 h-5">
            <span class="text-sm font-medium">Liberar saída</span>
        </button>

        <button (click)="irParaTabelaDeVeiculo()"
            class="flex items-center gap-4 px-7 py-3 text-white/90 hover:bg-[#a62323] hover:text-white transition-all border-l-4 border-transparent hover:border-white cursor-pointer">
            <img src="/listar-veiculo-image.svg" class="w-5 h-5">
            <span class="text-sm font-medium">Tabela de veículos</span>
        </button>
        
        <button (click)="irAoCadastroDeVeiculo()"
            class="flex items-center gap-4 px-7 py-3 text-white/90 hover:bg-[#a62323] hover:text-white transition-all border-l-4 border-transparent hover:border-white cursor-pointer">
            <img src="/adicionar-veiculo.svg" class="w-5 h-5">
            <span class="text-sm font-medium">Adicionar veículo</span>
        </button>

        @if (AuthService.isAdmin()) {
            <button (click)="irParaCadastroForm()"
                class="flex items-center gap-4 px-7 py-3 text-white/90 hover:bg-[#a62323] hover:text-white transition-all border-l-4 border-transparent hover:border-white cursor-pointer">
                <img src="/adicionar-user.svg" class="w-5 h-5">
                <span class="text-sm font-medium">Adicionar usuario</span>
            </button>

            <button (click)="irParaTabelaDeUsuarios()"
                class="flex items-center gap-4 px-7 py-3 text-white/90 hover:bg-[#a62323] hover:text-white transition-all border-l-4 border-transparent hover:border-white cursor-pointer">
                <img src="/table-user-icon.svg" class="w-5 h-5">
                <span class="text-sm font-medium">Lista de usuarios</span>
            </button>
        }


    </nav>
</aside>

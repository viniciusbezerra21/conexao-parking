<header class="flex justify-between w-full h-20 bg-[#CC2A2A]">
    <div class="my-auto mx-3 w-52 h-16 bg-[url('/logo-header.jpg')] bg-contain bg-no-repeat bg-center hover:cursor-pointer"
        (click)="irParaDashboard()">
    </div>

    <div class="relative my-auto mx-5 flex items-center gap-4">

        <button (click)="themeService.toggleTheme()"
            class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all cursor-pointer">
            @if (themeService.isDarkMode()) {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 text-yellow-300">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 text-indigo-900">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
            </svg>
            }
        </button>

        <div (click)="toggleMenu()" class="w-14 h-14 bg-[url('/user-icon.svg')] bg-contain bg-no-repeat bg-center cursor-pointer 
                    hover:opacity-80 active:opacity-60 transition-opacity duration-200">
        </div>

        <div [class.hidden]="!menuAberto"
            class="absolute top-16 right-0 mt-2 w-40 bg-white dark:bg-zinc-800 rounded-md shadow-xl py-1 z-50 border dark:border-zinc-700 transition-colors duration-300">
            <button (click)="logout(); menuAberto = false"
                class="w-full text-left block px-4 py-3 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-zinc-700 transition-colors cursor-pointer">
                Sair
            </button>
        </div>
    </div>
</header>

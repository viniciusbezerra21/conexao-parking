@if (visivel()) {
<div class="fixed bottom-5 right-5 z-50 animate-in slide-in-from-right-full duration-300">
    <div [ngClass]="config().containerClasses">

        <div [ngClass]="config().iconBgClasses">
            <svg xmlns="http://www.w3.org/2000/svg" [ngClass]="config().iconClasses" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="config().iconPath" />
            </svg>
        </div>

        <div>
            <p class="text-sm font-bold text-gray-800">{{ config().title }}</p>
            <p class="text-xs text-gray-500">{{ mensagem() }}</p>
        </div>

        <button (click)="fechar.emit()" class="ml-auto text-gray-400 hover:text-gray-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
</div>
}

<div class="w-full flex flex-col h-full bg-white overflow-hidden">

    <div [class.overflow-y-auto]="modoCompacto" [class.max-h-[calc(100vh-200px)]]="modoCompacto"
        class="w-full no-scrollbar flex-grow h-0">

        <table class="w-full text-left border-collapse">
            <thead class="bg-[#CC2A2A] text-white sticky top-0 z-10">
                <tr>
                    <th class="px-6 py-4 font-semibold text-center">Proprietário</th>
                    <th class="px-6 py-4 font-semibold text-center">Tipo veículo</th>
                    <th class="px-6 py-4 font-semibold text-center">CPF</th>
                    <th class="px-6 py-4 font-semibold text-center">Número placa</th>
                </tr>
            </thead>
            <tbody>
                <ng-content></ng-content>
            </tbody>
        </table>
    </div>

    @if (!modoCompacto) {
    <div class="flex justify-between items-center p-6 border-t border-gray-100 flex-shrink-0 bg-white">
        <div class="flex items-center gap-2 text-sm text-gray-600">
            <span>Mostrar:</span>
            <select class="border border-gray-300 rounded-lg px-3 py-1 cursor-pointer"
                (change)="aoMudarTamanho($event)">
                <option [value]="5">5</option>
                <option [value]="10">10</option>
                <option [value]="20">20</option>
            </select>
        </div>

        <div class="flex gap-4 items-center">
            <button (click)="paginaAnterior()" [disabled]="paginaAtual === 0"
                class="px-5 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 disabled:opacity-40 transition-all">
                Anterior
            </button>
            <span class="text-sm font-semibold text-gray-500">{{ paginaAtual + 1 }} / {{ totalPaginas }}</span>
            <button (click)="proximaPagina()" [disabled]="paginaAtual + 1 >= totalPaginas"
                class="px-5 py-2 bg-[#CC2A2A] text-white rounded-lg hover:bg-[#a62323] disabled:opacity-40 transition-all">
                Próxima
            </button>
        </div>
    </div>
    }
</div>

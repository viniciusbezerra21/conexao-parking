<div class="mt-10 ml-10 flex items-center justify-center">
    <form [formGroup]="veiculoForm" (ngSubmit)="onSubmit()" class="flex flex-col bg-[#CC2A2A] w-4xl p-10 rounded-xl min-w-150">
        <h3 class="text-[#FAFAFA] text-4xl text-center">Cadastre um veiculo</h3>

        <div class="mt-16 gap-2.5">

            <div class="flex flex-col gap-2">
                <label for="nome" class="text-xl text-white">Nome do proprietário:</label>
                <input type="text" class="w-full h-9 bg-white rounded-xs px-2 outline-none">
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <label for="nome" class="text-xl text-white">CPF do proprietário:</label>
                <input type="text" class="w-full h-9 bg-white rounded-xs px-2 outline-none">
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <label for="nome" class="text-xl text-white">Tipo do veículo:</label>
                <select type="text" class="w-full h-9 bg-white rounded-xs px-2 outline-none">
                    <option value="CARRO">Carro</option>
                    <option value="MOTO">Moto</option>
                </select>
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <label for="nome" class="text-xl text-white">Numero placa:</label>
                <input type="text" class="w-full h-9 bg-white rounded-xs px-2 outline-none">
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <label for="nome" class="text-xl text-white">Cor do veículo:</label>
                <input type="text" class="w-full h-9 bg-white rounded-xs px-2 outline-none">
            </div>
        </div>
        
        
    </form>
</div>

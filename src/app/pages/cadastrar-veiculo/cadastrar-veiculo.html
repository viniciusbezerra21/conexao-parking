<div class="mt-10 ml-10 flex items-center justify-center">
    <form [formGroup]="veiculoForm" (ngSubmit)="onSubmit()"
        class="flex flex-col bg-[#CC2A2A] w-4xl p-8 rounded-xl min-w-150">
        <h3 class="text-[#FAFAFA] text-4xl text-center">Cadastre um veículo</h3>

        <div class="mt-10 gap-2.5">

            <div formGroupName="proprietario">
                <div class="flex flex-col gap-2">
                    <label class="text-xl text-white">Nome do proprietário:</label>
                    <input type="text" class="w-full h-9 bg-white rounded-xs px-2 outline-none" formControlName="nome"
                        placeholder="Nome completo">
                </div>

                <div class="flex flex-col gap-2 mt-2">
                    <label class="text-xl text-white">CPF do proprietário:</label>
                    <input type="text" class="w-full h-9 bg-white rounded-xs px-2 outline-none"
                        formControlName="cpfProprietario" placeholder="000.000.000-00">
                </div>
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <label class="text-xl text-white">Tipo do veículo:</label>
                <select class="w-full h-9 bg-white rounded-xs px-2 outline-none" formControlName="tipoVeiculo">
                    <option value="CARRO">Carro</option>
                    <option value="MOTO">Moto</option>
                </select>
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <label class="text-xl text-white">Número placa:</label>
                <input type="text" class="w-full h-9 bg-white rounded-xs px-2 outline-none"
                    formControlName="numeroPlaca" placeholder="ABC-1234">
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <label class="text-xl text-white">Cor do veículo:</label>
                <input type="text" class="w-full h-9 bg-white rounded-xs px-2 outline-none" formControlName="cor">
            </div>
        </div>

        <button type="submit" [disabled]="veiculoForm.invalid"
            class="mt-6 bg-green-500 text-[#FAFAFA] font-bold py-2 rounded-lg disabled:opacity-50 hover:bg-green-600 duration-300">
            Adicionar
        </button>
        
        <button type="button"
            class="mt-6 bg-yellow-600 text-[#FAFAFA] font-bold py-2 rounded-lg disabled:opacity-50 hover:bg-yellow-700 duration-300">
            Cancelar
        </button>
    </form>
</div>

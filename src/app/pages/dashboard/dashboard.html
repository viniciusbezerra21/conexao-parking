<div class="flex flex-col gap-6">
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold text-gray-700">Veiculos estacionados</h2>
        <app-search-bar></app-search-bar>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <app-tabela [paginaAtual]="currentPage" [totalPaginas]="totalPages" (mudarPagina)="alterarPagina($event)"
            (mudarTamanho)="alterarTamanhoPagina($event)">

            @for (veiculo of veiculos; track veiculo.proprietario.idProprietario) {
            <tr class="hover:bg-gray-50 transition-colors cursor-pointer">
                <td class="px-6 py-4 border-b border-gray-100 text-gray-700 text-center">{{ veiculo.proprietario.nome }}</td>
                <td class="px-6 py-4 border-b border-gray-100 text-gray-700 text-center">{{ veiculo.tipoVeiculo }}</td>
                <td class="px-6 py-4 border-b border-gray-100 text-gray-700 text-center">{{ veiculo.proprietario.cpfProprietario }}
                </td>
                <td class="px-6 py-4 border-b border-gray-100 text-gray-700 text-center font-mono">{{ veiculo.numeroPlaca }}</td>
            </tr>
            } @empty {
            <tr>
                <td colspan="4" class="text-center py-10 text-gray-500">Nenhum veículo encontrado.</td>
            </tr>
            }
        </app-tabela>
    </div>
</div>

<main
    class="flex items-center justify-center min-h-screen bg-[url('/background-image.png')] bg-cover bg-position-[70%_center] bg-no-repeat">

    <app-login-form>
        <form [formGroup]="cadastroForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        
            <div class="flex flex-col gap-1">
                <label for="emailCorporativo" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">E-mail
                    corporativo</label>
                <input type="email" id="emailCorporativo" formControlName="emailCorporativo"
                    class="w-full px-4 h-12 bg-white border border-gray-200 rounded-lg outline-none transition-all focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
            </div>
        
            <div class="flex flex-col gap-1">
                <label for="senha" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Senha</label>
                <div class="relative w-full">
                    <input [type]="mostrarSenha ? 'text' : 'password'" id="senha" formControlName="senha"
                        class="w-full px-4 h-12 bg-white border border-gray-200 rounded-lg outline-none transition-all pr-12 focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
            
                    <button type="button" (click)="mostrarSenha = !mostrarSenha"
                        class="absolute right-3 top-0 bottom-0 my-auto h-6 w-6 z-10 opacity-60 hover:opacity-100 transition-opacity">
                        <img [src]="mostrarSenha ? 'https://cdn.iconscout.com/icon/premium/png-256-thumb/ocultar-5156380-4314205.png?f=webp&w=128' : 'https://cdn.iconscout.com/icon/premium/png-256-thumb/mostrar-senha-icon-svg-download-png-12871286.png?f=webp&w=128'"
                            alt="Alternar visibilidade">
                    </button>
                </div>
            </div>
            
            <div class="flex flex-col gap-1">
                <label for="repeteSenha" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Repita a senha</label>
                <div class="relative w-full">
                    <input [type]="mostrarRepeteSenha ? 'text' : 'password'" id="repeteSenha" formControlName="repeteSenha"
                        class="w-full px-4 h-12 bg-white border border-gray-200 rounded-lg outline-none transition-all pr-12 focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
            
                    <button type="button" (click)="mostrarRepeteSenha = !mostrarRepeteSenha"
                        class="absolute right-3 top-0 bottom-0 my-auto h-6 w-6 z-10 opacity-60 hover:opacity-100 transition-opacity">
                        <img [src]="mostrarRepeteSenha ? 'https://cdn.iconscout.com/icon/premium/png-256-thumb/ocultar-5156380-4314205.png?f=webp&w=128' : 'https://cdn.iconscout.com/icon/premium/png-256-thumb/mostrar-senha-icon-svg-download-png-12871286.png?f=webp&w=128'"
                            alt="Alternar visibilidade">
                    </button>
                </div>
            </div>
        
            <div class="mt-2">
                <app-botao-login type="submit" class="w-full block">Cadastrar</app-botao-login>
            </div>
        </form>
    </app-login-form>
</main>

<main
    class="flex items-center justify-center min-h-screen bg-[url('/background-image.png')] bg-cover bg-position-[70%_center] bg-no-repeat">
    <app-login-form [form]="loginForm">

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

            <div class="flex flex-col gap-2">
                <label for="emailCorporativo" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">E-mail corporativo:</label>
                <input type="email" id="emailCorporativo" formControlName="emailCorporativo"
                    class="w-full p-4 h-12 bg-amber-50 rounded outline-none">
            </div>

            <div class="flex flex-col gap-2">
                <label for="senha" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Senha:</label>
                <input type="password" id="senha" formControlName="senha"
                    class="w-full p-4 h-12 bg-amber-50 rounded outline-none">
                <span><a class="text-blue-500 tracking-wider hover:underline hover:text-red-900 duration-150  cursor-pointer"
                        (click)="irParaCadastro()">Não possuo cadastro.</a></span>
            </div>

            <app-botao-login type="submit">Entrar</app-botao-login>
        </form>

    </app-login-form>
</main>
